services:
  db:
    image: postgres:15
    container_name: ff_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: featureflags
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: ff_app
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/featureflags
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && node src/index.js"

volumes:
  pgdata:
